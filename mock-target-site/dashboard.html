<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Target Site - Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .dashboard {
            background: white;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .actions {
            margin: 30px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 3px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-green {
            background: #28a745;
            color: white;
        }
        .btn-green:hover {
            background: #218838;
        }
        .btn-red {
            background: #dc3545;
            color: white;
        }
        .btn-red:hover {
            background: #c82333;
        }
        .btn-logout {
            background: #6c757d;
            color: white;
        }
        .btn-logout:hover {
            background: #5a6268;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            display: none;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Welcome to Mock Trading Dashboard</h1>
        <p>You are logged in. Choose an action:</p>
        
        <div class="actions">
            <button class="btn-green" onclick="clickGreen()">GREEN</button>
            <button class="btn-red" onclick="clickRed()">RED</button>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
        
        <div class="result" id="result"></div>
    </div>

    <script>
        function clickGreen() {
            showResult('You clicked GREEN!');
        }

        function clickRed() {
            showResult('You clicked RED!');
        }

        function showResult(message) {
            const result = document.getElementById('result');
            result.textContent = message;
            result.style.display = 'block';
        }

        function logout() {
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
