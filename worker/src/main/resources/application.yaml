spring:
  application:
    name: super-trading-worker

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/supertrading}
    username: ${DB_USERNAME:supertrading}
    password: ${DB_PASSWORD:supertrading}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # The API owns the schema; the worker must not run migrations.
  flyway:
    enabled: false

supertrading:
  worker:
    region: ${AWS_REGION:}
    queue-url: ${WORKER_QUEUE_URL:}
    screenshot-bucket: ${WORKER_SCREENSHOT_BUCKET:}
    navigate-millis: ${WORKER_NAVIGATE_MILLIS:2000}
    wait-time-seconds: ${WORKER_WAIT_SECONDS:20}
    max-messages: ${WORKER_MAX_MESSAGES:10}

logging:
  level:
    com.rick.supertrading: info
