# ElasticMQ (SQS-compatible) config — pre-creates the jobs queue so neither the API
# (LocalScheduleTrigger) nor the worker has to create it.
include classpath("application.conf")

node-address {
    protocol = http
    host = "localhost"
    port = 9324
    context-path = ""
}

rest-sqs {
    enabled = true
    bind-port = 9324
    bind-hostname = "0.0.0.0"
    sqs-limits = strict
}

queues {
    supertrading-jobs {
        defaultVisibilityTimeout = 60 seconds
        receiveMessageWait = 0 seconds
    }
}
