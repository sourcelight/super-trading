name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (mvn verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      # GitHub-hosted ubuntu runners ship a running Docker daemon, so Testcontainers
      # spins up its own PostgreSQL for the *IT integration tests — no `services:` needed.
      - name: Build, unit + integration tests
        run: ./mvnw -B clean verify

      - name: Install Playwright browsers
        run: >
          ./mvnw -B -pl worker
          org.codehaus.mojo:exec-maven-plugin:3.1.1:java
          -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps chromium"

      - name: Browser end-to-end test (mock target site)
        run: ./mvnw -B -pl worker -am verify -De2e.playwright=true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: "**/target/*-reports/*.xml"
          if-no-files-found: ignore

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build
